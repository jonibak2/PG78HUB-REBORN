<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" type="image/png" href="https://i.imgur.com/1sd499C.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Календарь дней рождений PG78</title>
  <link rel="stylesheet" href="pages/pgCALENDAR/calendar_styles.css">
  <style>
    /* Прелоадер только для календаря */
    #calendar-loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #calendar-loader img {
      max-width: 260px;
      width: 80%;
      height: auto;
    }

    .loader-bar {
      width: 60%;
      max-width: 420px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      margin-top: 18px;
      overflow: hidden;
    }

    .loader-progress {
      height: 100%;
      width: 0;
      background: #ff0000;
      transition: width 0.3s ease;
    }

    /* Контент страницы скрыт, пока идёт прелоадер */
    #calendar-page-content {
      display: none;
    }

    /* Анимации для кнопки уведомлений */
    @keyframes pulse-btn {
      0%, 100% { 
        box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7);
      }
      50% { 
        box-shadow: 0 0 0 10px rgba(255, 107, 107, 0);
      }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes slideIn {
      from { 
        opacity: 0;
        transform: translateY(-10px);
      }
      to { 
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes checkmark {
      0% { 
        transform: scale(0);
        opacity: 0;
      }
      50% { 
        transform: scale(1.2);
      }
      100% { 
        transform: scale(1);
        opacity: 1;
      }
    }

    #enable-notifications-btn.loading {
      pointer-events: none;
      animation: pulse-btn 2s infinite;
    }

    #enable-notifications-btn.loading::before {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s linear infinite;
      vertical-align: middle;
    }

    #enable-notifications-btn.success {
      animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    }

    .notification-toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
      padding: 16px 24px;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
      font-weight: 500;
      animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .notification-toast::before {
      content: '✓';
      font-size: 18px;
      font-weight: bold;
      animation: checkmark 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .notification-toast.fadeOut {
      animation: fadeOut 0.4s ease-out forwards;
    }

    @keyframes fadeOut {
      from { 
        opacity: 1;
        transform: translateY(0);
      }
      to { 
        opacity: 0;
        transform: translateY(20px);
      }
    }
  </style>
</head>
<body>
  <div id="calendar-loader">
    <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExeWNuMXRjMzI2dHphd3RjejdzZGI3OGdqM3Jlenhqa3V3anY2c2M1NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/GCj1YPjqcNErSJUr6R/giphy.gif" alt="Loading">
    <div class="loader-bar">
      <div class="loader-progress"></div>
    </div>
  </div>

    <div id="calendar-page-content">
      <div class="header-buttons">
        <a href="https://jonibak2.github.io/PG78HUB-REBORN/" class="back-button glow-on-hover">← Назад в хаб</a>
        <button id="enable-notifications-btn" class="glow-on-hover" style="background: #ff6b6b; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.2s;">🔔 Разрешить уведомления</button>
        <button id="test-notification-btn" class="glow-on-hover" style="background: #ff9800; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.2s; margin-left: 0.5rem;">🧪 Тест уведомления</button>
        <a href="https://github.com/jonibak2" class="github-button github-glow-btn" aria-label="GitHub">
          <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub">
        </a>
      </div>

    <main class="calendar-contain" style="max-width: 100%;">
      <h1 style="text-align:center;margin-bottom:1rem;">Календарь дней рождений PG78</h1>
      <div class="year-navigation">
        <button id="prev-year" class="glow-on-hover">◀</button>
        <span id="current-year"></span>
        <button id="next-year" class="glow-on-hover">▶</button>
      </div>
      <div class="calendar-wrapper">
        <aside class="calendar__sidebar">
          <div class="content">
            <h2 class="sidebar__heading">Ближайшие дни рождения</h2>
            <ul id="upcoming-list" class="sidebar__list"></ul>
          </div>
        </aside>
        <div id="all-calendars"></div>
      </div>
    </main>

    <div class="overlay" id="overlay"></div>
    <div class="birthday-popup" id="birthday-popup">
      <span class="close" id="close-popup">&times;</span>
      <div id="popup-content"></div>
    </div>
  </div>

  <script src="pages/pgCALENDAR/calendar_script.js"></script>
</body>
</html>
